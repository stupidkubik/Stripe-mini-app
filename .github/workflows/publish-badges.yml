name: Publish Test Badges

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-test-badges
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CATALOGUE_SOURCE: fixture
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests and generate badges
        id: unit
        continue-on-error: true
        run: npm run test:unit:coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        run: npm run test:e2e

      - name: Generate badge files
        run: node scripts/generate-badges.mjs --unit-status ${{ steps.unit.outcome }} --e2e-status ${{ steps.e2e.outcome }}

      - name: Commit badge updates
        run: |
          if [ -n "$(git status --porcelain badges)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add badges/*.svg
            git commit -m "chore: update test badges"
            git push origin HEAD:main
          fi

      - name: Fail if tests failed
        if: steps.unit.outcome == 'failure' || steps.e2e.outcome == 'failure'
        run: exit 1
